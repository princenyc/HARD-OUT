      text-transform: uppercase;
      color: var(--black);
      background: var(--yellow);
      padding: 0.5rem 1.25rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .hero {

      flex-direction: column;

      overflow: hidden;

    .hero-bg {

          transparent 80px
        );
    }

    .hero-tag {

      line-height: 1.7;
